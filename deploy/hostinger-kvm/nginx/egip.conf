# Host nginx site — /etc/nginx/sites-available/egip
# Replace YOUR_DOMAIN with your real domain before enabling.

upstream egip_web {
    server 127.0.0.1:8081;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    client_max_body_size 50m;

    location / {
        proxy_pass http://egip_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}

# After Certbot runs, it adds a second server block for HTTPS and redirects HTTP → HTTPS.
