# Minimal stack for login + API — no GeoServer (lighter, faster)
# Use when full docker-compose.yml fails or GeoServer is not needed yet.

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: egip-postgres
    environment:
      POSTGRES_USER: egip
      POSTGRES_PASSWORD: egip_secret
      POSTGRES_DB: egip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egip -d egip"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: egip-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
