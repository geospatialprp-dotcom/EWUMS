        run: |
          if [ -z "$SSH_KEY" ]; then
            echo "ERROR: HOSTINGER_SSH_KEY secret is empty"
            exit 1
          fi
          if echo "$SSH_KEY" | grep -q "BEGIN"; then
            printf '%s\n' "$SSH_KEY" > deploy_key.pem
          else
            echo "$SSH_KEY" | tr -d ' \t\r\n' | base64 -d > deploy_key.pem
          fi
          chmod 600 deploy_key.pem
          if ! ssh-keygen -y -f deploy_key.pem >/dev/null 2>&1; then
            echo "ERROR: Invalid SSH key in HOSTINGER_SSH_KEY secret"
            exit 1
          fi
          eval "$(ssh-agent -s)"
          ssh-add deploy_key.pem
          echo "SSH key loaded OK"
