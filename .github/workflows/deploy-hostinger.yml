name: Deploy to Hostinger KVM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'geospatialprp-dotcom/EWUMS'
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HOSTINGER_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.HOSTINGER_SSH_PORT || 22 }}" -H "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          HOST: ${{ secrets.HOSTINGER_HOST }}
          USER: ${{ secrets.HOSTINGER_USER }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
        run: |
          set -euo pipefail
          ssh -p "$PORT" "${USER}@${HOST}" bash -s <<'REMOTE'
          set -euo pipefail
          cd /opt/egip/deploy/hostinger-kvm
          git -C /opt/egip pull --ff-only origin main
          bash deploy.sh
          REMOTE
